      height: 32px; background: #1e1e2e; color: #a0a0c0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 10px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0;
      border-bottom: 1px solid #2d2d3f;
    }
    .file-sidebar .sidebar-header .folder-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;

    .file-list {

      background: #f0a840; flex-shrink: 0; margin-left: auto;
    }
    .file-list .file-icon { font-size: 11px; opacity: 0.5; }

    .editor-pane {
      flex: 1; min-width: 0; display: flex; flex-direction: column;
      border-right: 1px solid #e2e8f0; background: #1e1e2e;
    }
    .editor-pane .pane-header {
      height: 32px; background: #2d2d3f; color: #a0a0c0;
      display: flex; align-items: center; padding: 0 12px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; flex-shrink: 0;
    }
    #editor-wrapper {
      flex: 1; overflow: hidden;
    }

      height: 100% !important; background: #1e1e2e !important; color: #cdd6f4 !important;

      font-size: 13px !important; line-height: 1.7 !important;

    .editor-pane .CodeMirror-selected { background: #364a6e !important; }
    .editor-pane .CodeMirror-focused .CodeMirror-selected { background: #364a6e !important; }
    .editor-pane .CodeMirror .CodeMirror-matchingbracket { color: #89dceb !important; }

    .editor-pane .cm-header { color: #f0a840 !important; font-weight: 700 !important; }
    .editor-pane .cm-header-1 { font-size: 1.2em !important; color: #f0a840 !important; }
    .editor-pane .cm-header-2 { font-size: 1.1em !important; color: #e0c070 !important; }
    .editor-pane .cm-header-3 { color: #c8d880 !important; }
    .editor-pane .cm-strong { color: #f9e2af !important; font-weight: 700 !important; }
    .editor-pane .cm-em { color: #cba6f7 !important; font-style: italic !important; }
    .editor-pane .cm-link { color: #89b4fa !important; }
    .editor-pane .cm-url { color: #6c7086 !important; }
    .editor-pane .cm-quote { color: #a6adc8 !important; font-style: italic !important; }
    .editor-pane .cm-comment { color: #6c7086 !important; }
    .editor-pane .cm-keyword { color: #cba6f7 !important; }
    .editor-pane .cm-atom { color: #fab387 !important; }
    .editor-pane .cm-string { color: #a6e3a1 !important; }
    .editor-pane .cm-hr { color: #585b70 !important; }
    .editor-pane .cm-tag { color: #f38ba8 !important; }
    .editor-pane .cm-attribute { color: #89b4fa !important; }
    .editor-pane .cm-def { color: #89dceb !important; }

    .preview-pane {
      flex: 1; min-width: 0; display: flex; flex-direction: column; background: #e5e7eb;
    }
    .preview-pane .pane-header {
      height: 32px; background: #f1f5f9; color: #64748b;
      display: flex; align-items: center; padding: 0 12px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; flex-shrink: 0;
      border-bottom: 1px solid #e2e8f0;
    }
    #preview-container {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
    }
    #preview-wrapper {
      flex-shrink: 0;
      margin: 0 auto;
    }
    #preview-frame {
      border: none; background: transparent;
      /* A4 at 96dpi = ~794px wide; scaled down via JS transform */
      width: 794px;
      height: 20000px; /* large initial height so Paged.js can render before we measure */
      transform-origin: top left;
    }

    /* ── Resize handle ─────────────────────────────────────── */
    .resize-handle {
      width: 5px; cursor: col-resize; background: #cbd5e1;
      transition: background 0.15s; flex-shrink: 0;
    }
    .resize-handle:hover, .resize-handle.active { background: #3373b3; }

      if (isResizing) {
        isResizing = false;
        handle.classList.remove("active");
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        previewFrame.style.pointerEvents = "";
        cm.refresh();
        scalePreview();
      }
    });

    // ── Open in new tab ──────────────────────────────────────────────────
    function openPreviewTab() {
      const html = buildPagedHtml(editor.value);
      const blob = new Blob([html], { type: "text/html" });
      window.open(URL.createObjectURL(blob), "_blank");
    }

    // ── Load file via drag & drop ────────────────────────────────────────
    const cmEl = cm.getWrapperElement();
    cmEl.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "copy"; });
    cmEl.addEventListener("drop", e => {
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      if (file && file.name.endsWith(".md")) {
        e.preventDefault();
        e.stopPropagation();
        const reader = new FileReader();
        reader.onload = ev => { cm.setValue(ev.target.result); triggerRender(); };
        reader.readAsText(file);
      }
    });

    // ── IndexedDB helpers (persist FileSystemDirectoryHandle) ───────────
    const IDB_NAME = "paged-editor";
    const IDB_STORE = "state";
    function idbOpen() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbSet(key, val) {
      const db = await idbOpen();
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(val, key);
      return new Promise(r => { tx.oncomplete = r; });
    }
    async function idbGet(key) {
      const db = await idbOpen();
      const tx = db.transaction(IDB_STORE, "readonly");
      const req = tx.objectStore(IDB_STORE).get(key);
      return new Promise(r => { req.onsuccess = () => r(req.result); });
    }

    // ── File System Access API ───────────────────────────────────────────
    let dirHandle = null;       // DirectoryHandle for the opened folder
    let fileHandles = [];       // [{name, handle}] sorted
    let activeFileIdx = -1;     // index in fileHandles
    let activeFileName = "";    // name of active file (for restore after reload)
    let savedContent = "";      // content at last save/load (for dirty detection)

    function isDirty() { return activeFileIdx >= 0 && cm.getValue() !== savedContent; }

    const fileSidebar = document.getElementById("fileSidebar");
    const fileList = document.getElementById("fileList");
    const folderNameEl = document.getElementById("folderName");
    const paneFileName = document.getElementById("paneFileName");
    const btnSave = document.getElementById("btnSave");

    async function openFolder() {
      try {
        dirHandle = await window.showDirectoryPicker({ mode: "readwrite" });
      } catch(e) { return; } // user cancelled

      await activateFolder();
    }

    async function activateFolder(restoreFile) {
      folderNameEl.textContent = dirHandle.name;
      fileSidebar.classList.add("open");
      btnSave.style.display = "";
      cm.refresh();

      // Persist handle for reload
      await idbSet("dirHandle", dirHandle);

      await refreshFileList();

      // Restore previously active file, or open first
      let idx = 0;
      if (restoreFile) {
        const found = fileHandles.findIndex(f => f.name === restoreFile);
        if (found >= 0) idx = found;
      }
      if (fileHandles.length > 0) await openFile(idx);
    }

    async function refreshFileList() {
      fileHandles = [];
      for await (const [name, handle] of dirHandle.entries()) {
        if (handle.kind === "file" && name.endsWith(".md")) {
          fileHandles.push({ name, handle });
        }
      }
      fileHandles.sort((a, b) => a.name.localeCompare(b.name));
      renderFileList();
    }

    function renderFileList() {
      fileList.innerHTML = "";
      fileHandles.forEach((f, i) => {
        const el = document.createElement("div");
        el.className = "file-item" + (i === activeFileIdx ? " active" : "");
        if (i === activeFileIdx && isDirty()) el.classList.add("dirty");
        el.innerHTML = '<span class="file-icon">📄</span>' + escapeHtml(f.name);
        el.onclick = () => openFile(i);
        fileList.appendChild(el);
      });
    }

    async function openFile(idx) {
      // Save current if dirty
      if (isDirty()) await doSave();

      activeFileIdx = idx;
      const fh = fileHandles[idx];
      activeFileName = fh.name;
      const file = await fh.handle.getFile();
      const text = await file.text();
      savedContent = text;
      cm.setValue(text);
      cm.clearHistory();
      paneFileName.textContent = fh.name;
      document.title = fh.name + " — Paged.js Editor";
      renderFileList();
      triggerRender();

      // Remember active file for reload
      await idbSet("activeFile", fh.name);
    }

    async function doSave() {
      if (activeFileIdx < 0) return;
      const fh = fileHandles[activeFileIdx];
      try {
        const writable = await fh.handle.createWritable();
        await writable.write(cm.getValue());
        await writable.close();
        savedContent = cm.getValue();
        status.textContent = "Saved " + fh.name;
        renderFileList();
      } catch(e) {
        status.textContent = "Save failed: " + e.message;
      }
    }

    async function saveCurrentFile() {
      await doSave();
    }

    // Track dirty state
    cm.on("change", () => {
      if (activeFileIdx >= 0) renderFileList();
    });

    // Ctrl+S / Cmd+S to save
    document.addEventListener("keydown", e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "s") {
        e.preventDefault();
        if (activeFileIdx >= 0) doSave();
      }
    });

    // ── Warn before closing with unsaved changes ─────────────────────────
    window.addEventListener("beforeunload", e => {
      if (isDirty()) {
        e.preventDefault();
        e.returnValue = "";
      }
    });

    // ── Restore folder on page load ──────────────────────────────────────
    async function tryRestore() {
      try {
        const stored = await idbGet("dirHandle");
        if (!stored) return;
        // Verify permission (may prompt user)
        const perm = await stored.requestPermission({ mode: "readwrite" });
        if (perm !== "granted") return;
        dirHandle = stored;
        const restoreFile = await idbGet("activeFile");
        await activateFolder(restoreFile || null);
      } catch(e) { /* no stored handle or permission denied */ }
    }

    // ── Initial render (wait for Paged.js to be loaded) ────────────────
    pagedReady.then(async () => {
      await tryRestore();
      if (activeFileIdx < 0) setTimeout(triggerRender, 100);
    });
  </script>
</body>
</html>
