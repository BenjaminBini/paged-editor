<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8" />
  {{BASE_HREF}}
  {{FONTS_TAG}}
  <style>{{PDF_CSS}}</style>
  <style>{{PAGED_CSS}}</style>
  <style>
  /* Content-only previews should use the common first-page layout. */
  @page :first {
    margin: 20mm 18mm 25mm 18mm;
    @top {
      content: element(pdf-page-gradient);
    }
    @top-center {
      content: element(pdf-running-header);
    }
    @bottom {
      content: counter(page);
      font-family: "Hanken Grotesk", sans-serif;
      font-size: 8pt;
      color: #718096;
    }
  }
  </style>
  {{LOGO_STYLE}}
  <script>window.PagedConfig = { auto: false };</script>
</head>
<body>
  <div class="pdf-page-gradient"></div>
  {{RUNNING_HEADER}}
  <div class="pdf-content">{{BODY_HTML}}</div>
  {{PAGED_JS_TAG}}
  <script>window.__gen = {{GEN}};</script>
  {{SECTION_INIT_TAG}}
</body>
</html>
